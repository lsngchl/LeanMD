<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A small, local-first Markdown viewer with bracket-delimited LaTeX support."
    />
    <title>LeanMD Viewer</title>
  </head>
  <body>
    <header class="topbar">
      <div class="brand" aria-label="LeanMD Viewer">
        <span>LeanMD</span>
      </div>

      <div class="topbar-actions">
        <button id="themeButton" class="quiet-button" type="button">Dark</button>
        <label id="openButton" class="open-button" for="fileInput">Open .md</label>
        <input
          id="fileInput"
          class="visually-hidden"
          type="file"
          accept=".md,.markdown,text/markdown,text/plain"
        />
      </div>
    </header>

    <main class="app-shell">
      <section class="document-card" aria-label="Markdown document viewer">
        <div class="document-toolbar">
          <div class="document-identity">
            <p id="documentName" class="document-name">No document open</p>
          </div>
          <button id="sampleButton" class="text-button" type="button">
            Reload sample
          </button>
        </div>

        <div class="document-content">
          <article
            id="preview"
            class="markdown-body"
            aria-live="polite"
            hidden
          ></article>
          <div id="emptyState" class="empty-state">
            <span class="empty-state-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="img">
                <path d="M14 5.5h13l8 8V25" />
                <path d="M27 5.5v8h8" />
                <path d="M14 5.5a3 3 0 0 0-3 3v31a3 3 0 0 0 3 3h12" />
                <path d="M34 28v13" />
                <path d="m28.5 35.5 5.5 5.5 5.5-5.5" />
              </svg>
            </span>
            <strong>Drop a Markdown file here</strong>
            <span>or use <b>Open .md</b> to choose one.</span>
          </div>
          <div
            id="viewerLoading"
            class="viewer-loading is-visible"
            role="status"
            aria-live="polite"
            aria-hidden="false"
          >
            <div class="viewer-loading-content">
              <span class="viewer-spinner" aria-hidden="true"></span>
              <span>Preparing document…</span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="dropOverlay" class="drop-overlay" aria-hidden="true">
      <div class="drop-message">
        <strong>Drop a Markdown file</strong>
        <span>Release to open it.</span>
      </div>
    </div>

    <p id="status" class="visually-hidden" role="status" aria-live="polite"></p>

    <noscript>This viewer requires JavaScript to render Markdown and mathematics.</noscript>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
